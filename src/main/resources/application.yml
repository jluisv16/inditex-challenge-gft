spring:
  datasource:
    url: jdbc:h2:file:/Users/jornat/testdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true
  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
