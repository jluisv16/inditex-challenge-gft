spring:
  datasource:
    url: jdbc:h2:mem:testdb
  cache:
    type: none
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
resilience4j:
  circuitbreaker:
    instances:
      priceService:
        failureRateThreshold: 100
        minimumNumberOfCalls: 10000

  retry:
    instances:
      priceService:
        maxAttempts: 1
