spring:
  datasource:
    url: jdbc:h2:mem:testdb
  cache:
    type: caffeine
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
resilience4j:
  circuitbreaker:
    instances:
      priceService:
        registerHealthIndicator: false
        slidingWindowSize: 100
        minimumNumberOfCalls: 1000
        failureRateThreshold: 100

  retry:
    instances:
      priceService:
        maxAttempts: 1
